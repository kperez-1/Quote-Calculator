<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Quote Calc">
<meta name="theme-color" content="#1D9E75">
<title>Quote Calculator</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f4f0;color:#1a1a1a;padding:12px;max-width:580px;margin:0 auto;padding-bottom:40px;}
h1{font-size:17px;font-weight:600;color:#1a1a1a;margin-bottom:14px;padding:4px 0;}
.card{background:#fff;border:0.5px solid rgba(0,0,0,0.12);border-radius:12px;padding:14px 16px;margin-bottom:10px;}
.card-title{font-size:14px;font-weight:600;color:#1a1a1a;margin-bottom:12px;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;}
.field{display:flex;flex-direction:column;gap:4px;}
.field label{font-size:12px;color:#666;}
.field input,.field select{height:38px;padding:0 10px;border:0.5px solid rgba(0,0,0,0.15);border-radius:8px;background:#f5f4f0;color:#1a1a1a;font-size:14px;width:100%;-webkit-appearance:none;appearance:none;}
.field input:focus,.field select:focus{outline:2px solid #1D9E75;outline-offset:-1px;}
.toggle{position:relative;width:36px;height:20px;flex-shrink:0;}
.toggle input{opacity:0;width:0;height:0;}
.tog-sl{position:absolute;cursor:pointer;inset:0;background:#ccc;border-radius:20px;transition:background 0.2s;}
.tog-sl:before{content:'';position:absolute;width:14px;height:14px;left:3px;top:3px;background:white;border-radius:50%;transition:transform 0.2s;}
.toggle input:checked+.tog-sl{background:#1D9E75;}
.toggle input:checked+.tog-sl:before{transform:translateX(16px);}
.mat-block{border:0.5px solid rgba(0,0,0,0.1);border-radius:8px;padding:12px;margin-bottom:8px;background:#f9f9f7;}
.mat-block-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.mat-block-title{font-size:13px;font-weight:600;color:#1a1a1a;}
.tax-row{display:flex;gap:6px;align-items:flex-end;}
.tax-input-wrap{flex:1;}
.tax-toggle-wrap{display:flex;flex-direction:column;gap:4px;align-items:center;flex-shrink:0;padding-bottom:2px;}
.tax-toggle-label{font-size:10px;color:#666;white-space:nowrap;}
.margin-block{margin-top:8px;}
.margin-slider-row{display:flex;align-items:center;gap:10px;}
.margin-slider-row input[type=range]{flex:1;accent-color:#1D9E75;}
.margin-val{font-size:13px;font-weight:600;min-width:38px;text-align:right;color:#1a1a1a;}
.margin-label{font-size:12px;color:#666;white-space:nowrap;}
.nudge-row{display:flex;gap:4px;margin-top:5px;}
.nudge-btn{flex:1;height:28px;border:0.5px solid rgba(0,0,0,0.15);border-radius:7px;background:#f5f4f0;color:#333;font-size:18px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.nudge-btn:active{background:#e0e0dc;}
.mode-tabs{display:flex;gap:6px;margin-bottom:10px;}
.tab{flex:1;height:36px;border:0.5px solid rgba(0,0,0,0.15);border-radius:8px;background:transparent;color:#666;font-size:13px;cursor:pointer;}
.tab.active{background:#1D9E75;color:white;border-color:#1D9E75;}
.rnd-row{display:flex;gap:6px;margin-top:6px;align-items:center;}
.rnd-divider{width:1px;height:20px;background:rgba(0,0,0,0.12);flex-shrink:0;}
.rnd-btn{flex:1;height:36px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid rgba(0,0,0,0.15);background:#f5f4f0;color:#888;transition:all 0.15s;}
.rnd-btn.up.selected{background:#1D9E75;color:#fff;border-color:#0F6E56;}
.rnd-btn.down.selected{background:#D85A30;color:#fff;border-color:#993C1D;}
.result-area{background:#eef9f4;border:0.5px solid #9FE1CB;border-radius:12px;padding:16px;margin-top:4px;}
.mat-results{display:flex;flex-direction:column;gap:8px;margin-bottom:12px;}
.mat-result-card{background:#fff;border:0.5px solid rgba(0,0,0,0.1);border-radius:8px;padding:10px 14px;}
.mat-result-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px;}
.mat-result-name{font-size:13px;font-weight:600;color:#1a1a1a;}
.mat-result-price{font-size:24px;font-weight:600;}
.price-up{color:#1D9E75;}
.price-down{color:#D85A30;}
.price-neutral{color:#1a1a1a;}
.mat-result-sub{font-size:11px;color:#888;}
.haul-result-card{background:#fff;border:0.5px solid rgba(0,0,0,0.1);border-radius:8px;padding:10px 14px;margin-bottom:12px;}
.broker-note{font-size:11px;color:#666;margin-top:6px;padding:6px 8px;background:#f5f4f0;border-radius:6px;border:0.5px solid rgba(0,0,0,0.1);}
.margin-table{width:100%;border-collapse:collapse;margin-top:12px;}
.margin-table th{font-size:11px;font-weight:600;color:#888;text-align:right;padding:6px 8px 4px;border-bottom:0.5px solid rgba(0,0,0,0.1);}
.margin-table th:first-child{text-align:left;}
.margin-table td{font-size:13px;color:#444;text-align:right;padding:5px 8px;}
.margin-table td:first-child{text-align:left;font-weight:600;color:#1a1a1a;}
.margin-table tr.combined-row td{font-weight:600;color:#1a1a1a;border-top:0.5px solid rgba(0,0,0,0.1);padding-top:8px;}
.margin-table td.neg{color:#D85A30;font-weight:600;}
.margin-table tr.combined-row.over-target td{color:#D85A30;}
.allin-row{display:flex;justify-content:space-between;font-size:14px;font-weight:600;padding-top:10px;margin-top:6px;border-top:0.5px solid rgba(0,0,0,0.1);}
.allin-row.up{color:#1D9E75;}
.allin-row.down{color:#D85A30;}
.allin-row.neutral{color:#0F6E56;}
.warning-banner{background:#FAECE7;border:1px solid #F0997B;border-radius:8px;padding:10px 14px;margin-top:10px;font-size:13px;color:#993C1D;font-weight:500;display:none;}
.script-section{margin-top:12px;border-top:0.5px solid rgba(0,0,0,0.1);padding-top:12px;}
.stabs{display:flex;gap:6px;margin-bottom:8px;}
.stab{flex:1;height:32px;border:0.5px solid rgba(0,0,0,0.15);border-radius:8px;background:transparent;color:#666;font-size:12px;cursor:pointer;}
.stab.active.int{background:#185FA5;color:white;border-color:#185FA5;}
.stab.active.ext{background:#0F6E56;color:white;border-color:#0F6E56;}
.script-box{background:#fff;border:0.5px solid rgba(0,0,0,0.12);border-radius:8px;padding:12px 14px;font-size:12px;color:#1a1a1a;line-height:1.65;white-space:pre-wrap;word-break:break-word;margin-bottom:8px;min-height:80px;font-family:'Menlo','Courier New',monospace;}
.copy-btn{width:100%;height:40px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:all 0.15s;}
.copy-btn.int{border:1.5px solid #185FA5;color:#185FA5;background:transparent;}
.copy-btn.ext{border:1.5px solid #0F6E56;color:#0F6E56;background:transparent;}
.copy-btn.copied{background:#1D9E75;color:white;border-color:#1D9E75;}
.disabled{opacity:0.35;pointer-events:none;}
</style>
</head>
<body>
<h1>Quote Calculator</h1>

<div class="card">
  <div class="card-title">Unit of measure</div>
  <div class="field">
    <select id="uom">
      <option value="ton">Per ton</option>
      <option value="cy">Per cubic yard (CY)</option>
      <option value="load">Per load</option>
    </select>
  </div>
</div>

<div class="card">
  <div class="card-title">Hauling</div>
  <div id="haul-fields">
    <div class="field" style="margin-bottom:8px;">
      <label>Haul cost — what you pay the truck ($)</label>
      <input type="number" id="haul-cost" min="0" step="0.01" placeholder="0.00" inputmode="decimal">
    </div>
    <div class="margin-block">
      <div class="margin-slider-row">
        <span class="margin-label">Add'l margin</span>
        <input type="range" id="haul-margin" min="0" max="50" step="1" value="10">
        <span class="margin-val" id="haul-margin-disp">10%</span>
      </div>
      <div class="nudge-row">
        <button class="nudge-btn minus" data-target="haul-margin" data-disp="haul-margin-disp" data-min="0" data-max="50">&#8722;</button>
        <button class="nudge-btn plus"  data-target="haul-margin" data-disp="haul-margin-disp" data-min="0" data-max="50">&#43;</button>
      </div>
    </div>
    <div class="broker-note" id="broker-note" style="display:none;"></div>
  </div>
</div>

<div class="card">
  <div class="card-title">Materials</div>
  <div id="mat-list"></div>
</div>

<div class="card">
  <div class="card-title">Output mode</div>
  <div class="mode-tabs">
    <button class="tab active" data-mode="margin">Margin-based</button>
    <button class="tab" data-mode="target">Target price</button>
  </div>
  <div id="mode-margin">
    <div style="font-size:12px;color:#666;margin-bottom:4px;">Rounding</div>
    <div class="rnd-row">
      <button class="rnd-btn up"   data-val="0.5" data-dir="up">+$0.50</button>
      <button class="rnd-btn up"   data-val="1"   data-dir="up">+$1.00</button>
      <div class="rnd-divider"></div>
      <button class="rnd-btn down" data-val="0.5" data-dir="down">−$0.50</button>
      <button class="rnd-btn down" data-val="1"   data-dir="down">−$1.00</button>
    </div>
  </div>
  <div id="mode-target" style="display:none;">
    <div class="field">
      <label>Target all-in price ($)</label>
      <input type="number" id="target-price" min="0" step="0.5" placeholder="e.g. 34.00" inputmode="decimal">
    </div>
  </div>
</div>

<div class="result-area" id="result-area" style="display:none;">
  <div style="font-size:12px;color:#555;margin-bottom:8px;">Quoted prices per <span id="res-uom">ton</span></div>
  <div class="mat-results" id="mat-results"></div>
  <div class="haul-result-card" id="haul-result-card" style="display:none;">
    <div class="mat-result-top">
      <span class="mat-result-name">Hauling</span>
      <span class="mat-result-price price-neutral" id="haul-sell-disp">—</span>
    </div>
    <div class="mat-result-sub" id="haul-result-sub"></div>
  </div>
  <div id="bk"></div>
  <div class="warning-banner" id="warning-banner">Target price is below total cost — increase the target or reduce your costs.</div>
  <div class="script-section">
    <div style="font-size:13px;font-weight:600;color:#555;margin-bottom:8px;">Share this quote</div>
    <div class="field" style="margin-bottom:8px;">
      <label>Customer name (optional)</label>
      <input type="text" id="customer-name" placeholder="e.g. ABC Paving">
    </div>
    <div class="stabs">
      <button class="stab active int" data-stab="internal">Internal</button>
      <button class="stab ext" data-stab="external">Customer-facing</button>
    </div>
    <div class="script-box" id="script-box"></div>
    <button class="copy-btn int" id="copy-btn">
      <span>&#x2398;</span><span id="copy-label">Copy internal script</span>
    </button>
  </div>
</div>

<script>
const $=id=>document.getElementById(id);
const BROKER=0.10;
let roundTo=1,roundDir='up',mode='margin',scriptTab='internal';
let matIdCounter=0,materials=[],lastCalc={};
const uomLabel={ton:'ton',cy:'CY',load:'load'};
const fmt=n=>'$'+n.toFixed(2);
const fmtR=n=>'$'+n.toFixed(2);

function applyRound(v){return roundDir==='up'?Math.ceil(v/roundTo)*roundTo:Math.floor(v/roundTo)*roundTo;}
function priceClass(){if(mode!=='margin')return'price-neutral';return roundDir==='up'?'price-up':'price-down';}

function calcHaulSell(c,pct){
  if(c<=0)return 0;
  const net=c*(1-BROKER),m=pct/100;
  return m>=1?net*100:net/(1-m);
}

function setActiveRnd(btn){
  document.querySelectorAll('.rnd-btn').forEach(b=>b.classList.remove('selected'));
  btn.classList.add('selected');
  roundTo=parseFloat(btn.dataset.val);
  roundDir=btn.dataset.dir;
}

function createMat(){return{id:'m'+(++matIdCounter),type:'',cost:0,tax:6.5,taxOn:true,margin:15};}

function matTaxRowHTML(m){
  return`<div class="tax-row">
    <div class="tax-input-wrap field">
      <label>Tax rate (%)</label>
      <input type="number" data-id="${m.id}" data-f="tax" min="0" step="0.1" value="${m.tax}" inputmode="decimal" ${m.taxOn?'':'disabled style="opacity:0.4;"'}>
    </div>
    <div class="tax-toggle-wrap">
      <span class="tax-toggle-label">No tax</span>
      <label class="toggle" style="width:32px;height:18px;">
        <input type="checkbox" data-id="${m.id}" data-f="taxOff" ${m.taxOn?'':'checked'}>
        <span class="tog-sl"></span>
      </label>
    </div>
  </div>`;
}

function renderMats(){
  const list=$('mat-list');
  list.innerHTML='';
  materials.forEach(m=>{
    const did='mv-'+m.id;
    const div=document.createElement('div');
    div.className='mat-block';
    div.innerHTML=`
      <div class="mat-block-header"><span class="mat-block-title">Material</span></div>
      <div class="row2">
        <div class="field">
          <label>Material type (optional)</label>
          <input type="text" data-id="${m.id}" data-f="type" placeholder="e.g. #57 Stone" value="${m.type}">
        </div>
        <div class="field" style="justify-content:flex-end;">${matTaxRowHTML(m)}</div>
      </div>
      <div class="field" style="margin-bottom:6px;">
        <label>Material cost ($)</label>
        <input type="number" data-id="${m.id}" data-f="cost" min="0" step="0.01" placeholder="0.00" value="${m.cost||''}" inputmode="decimal">
      </div>
      <div class="margin-block">
        <div class="margin-slider-row">
          <span class="margin-label">Margin</span>
          <input type="range" data-id="${m.id}" data-f="margin" min="0" max="60" step="1" value="${m.margin}">
          <span class="margin-val" id="${did}">${m.margin}%</span>
        </div>
        <div class="nudge-row">
          <button class="nudge-btn minus" data-id="${m.id}" data-f="margin-nudge" data-disp="${did}" data-min="0" data-max="60">&#8722;</button>
          <button class="nudge-btn plus"  data-id="${m.id}" data-f="margin-nudge" data-disp="${did}" data-min="0" data-max="60">&#43;</button>
        </div>
      </div>`;
    list.appendChild(div);
  });

  list.querySelectorAll('input[type=range]').forEach(el=>{
    if(el.dataset.f!=='margin')return;
    el.addEventListener('input',function(){
      const mat=materials.find(m=>m.id===this.dataset.id);
      if(mat){mat.margin=parseInt(this.value);$('mv-'+this.dataset.id).textContent=mat.margin+'%';}
      calc();
    });
  });
  list.querySelectorAll('.nudge-btn').forEach(el=>{
    el.addEventListener('click',function(){
      const mat=materials.find(m=>m.id===this.dataset.id);
      if(!mat)return;
      const isPlus=this.classList.contains('plus');
      const min=parseInt(this.dataset.min||0),max=parseInt(this.dataset.max||60);
      mat.margin=Math.min(max,Math.max(min,mat.margin+(isPlus?1:-1)));
      const sl=list.querySelector(`input[type=range][data-id="${mat.id}"][data-f="margin"]`);
      if(sl)sl.value=mat.margin;
      $(this.dataset.disp).textContent=mat.margin+'%';
      calc();
    });
  });
  list.querySelectorAll('input[data-f="taxOff"]').forEach(el=>{
    el.addEventListener('change',function(){
      const mat=materials.find(m=>m.id===this.dataset.id);
      if(!mat)return;
      mat.taxOn=!this.checked;
      renderMats();calc();
    });
  });
  list.querySelectorAll('input[type=text],input[type=number]').forEach(el=>{
    if(el.dataset.f==='taxOff'||el.dataset.f==='margin')return;
    el.addEventListener('input',function(){
      const mat=materials.find(m=>m.id===this.dataset.id);
      if(!mat)return;
      const f=this.dataset.f;
      if(f==='cost'||f==='tax')mat[f]=parseFloat(this.value)||0;
      else mat[f]=this.value;
      calc();
    });
  });
}

function calc(){
  const uom=$('uom').value;
  const haulCost=parseFloat($('haul-cost').value)||0;
  const haulOn=haulCost>0;
  const haulSlider=parseInt($('haul-margin').value)||0;
  const targetPrice=parseFloat($('target-price').value)||0;

  const haulSell=haulOn?calcHaulSell(haulCost,haulSlider):0;
  const brokerKeep=haulOn?haulCost*BROKER:0;
  const netPayout=haulOn?haulCost*(1-BROKER):0;
  const haulTotalMarginPct=haulSell>0?((haulSell-netPayout)/haulSell*100):0;

  if(haulOn){
    $('broker-note').style.display='block';
    $('broker-note').textContent='Broker fee (10%): '+fmt(brokerKeep)+' kept | Net payout: '+fmt(netPayout)+' | Sell: '+fmt(haulSell)+' | Total margin: '+haulTotalMarginPct.toFixed(1)+'%';
  } else {
    $('broker-note').style.display='none';
  }

  const matData=materials.map(m=>{
    const et=m.taxOn?m.tax:0;
    const sell=m.cost>0&&m.margin<100?m.cost/(1-m.margin/100):0;
    const customerPrice=sell*(1+et/100);
    const raw=customerPrice+haulSell;
    return{...m,effectiveTax:et,taxed:m.cost,sell,customerPrice,marginAmt:sell-m.cost,raw,rounded:applyRound(raw)};
  });

  const activeMats=matData.filter(m=>m.cost>0);
  const hasMat=activeMats.length>0;
  const mat=hasMat?activeMats[0]:null;

  const hasData=hasMat||haulOn;
  if(!hasData){$('result-area').style.display='none';return;}
  $('result-area').style.display='block';
  $('res-uom').textContent=uomLabel[uom];

  // --- quoted price cards ---
  const pc=priceClass();
  const matRes=$('mat-results');
  matRes.innerHTML='';
  if(hasMat){
    const m=mat;
    let priceStr,subStr,pClass;
    if(mode==='margin'){
      const disp=haulOn?m.rounded:applyRound(m.sell);
      priceStr=fmtR(disp);pClass=pc;
      const dl=roundDir==='up'?'rounded up':'rounded down';
      const tl=m.taxOn?m.tax.toFixed(1)+'% tax on sell':'no tax';
      subStr=`${m.type||'Material'} + haul, ${dl} | mat sell: ${fmt(m.sell)} + tax: ${fmt(m.customerPrice-m.sell)}${haulOn?' + haul: '+fmt(haulSell):''}`;
    } else {
      const disp=targetPrice>0?targetPrice:m.raw;
      priceStr=fmt(disp);pClass='price-neutral';
      subStr=`${targetPrice>0?'Target':'Raw'} | mat: ${fmt(m.sell)}${haulOn?' + haul: '+fmt(haulSell):''}`;
    }
    const card=document.createElement('div');
    card.className='mat-result-card';
    card.innerHTML=`<div class="mat-result-top"><span class="mat-result-name">${m.type||'Material'}</span><span class="mat-result-price ${pClass}">${priceStr}</span></div><div class="mat-result-sub">${subStr}</div>`;
    matRes.appendChild(card);
  }

  if(haulOn){
    $('haul-result-card').style.display='block';
    $('haul-sell-disp').textContent=fmt(haulSell);
    $('haul-result-sub').textContent=`Pay truck: ${fmt(haulCost)} | Broker: ${fmt(brokerKeep)} | Net payout: ${fmt(netPayout)} | Total margin: ${haulTotalMarginPct.toFixed(1)}%`;
  } else {
    $('haul-result-card').style.display='none';
  }

  // --- all-in ---
  if(mode==='margin'){
    if(hasMat) allIn=haulOn?mat.rounded:applyRound(mat.customerPrice);
    else if(haulOn) allIn=applyRound(haulSell);
  } else {
    allIn=targetPrice>0?targetPrice:(hasMat?mat.raw:haulSell);
  }

  const haulNetCost=haulOn?netPayout:0;
  const matCostVal=mat?mat.cost:0;
  const matSellVal=mat?mat.sell:0;
  const matCustomerPrice=mat?mat.customerPrice:0;
  const combinedCost=haulNetCost+matCostVal;
  const combinedCost=haulNetCost+matCostVal;
  const combinedSell=allIn;
  const overTarget=mode==='target'&&targetPrice>0&&combinedCost>targetPrice;

  const mpct=(cost,sell)=>sell>0?((sell-cost)/sell*100):0;
  const mdol=(cost,sell)=>sell-cost;
  const fp=n=>n.toFixed(1)+'%';
  const dash='—';
  const neg=(cost,sell)=>mdol(cost,sell)<0?'neg':'';

  const bk=$('bk');
  bk.innerHTML='';
  const tbl=document.createElement('table');
  tbl.className='margin-table';
  tbl.innerHTML=`
    <thead>
      <tr>
        <th></th>
        <th>Cost</th>
        <th>Sell</th>
        <th>Margin $</th>
        <th>Margin %</th>
      </tr>
    </thead>
    <tbody>
      <tr style="${haulOn?'':'display:none'}">
        <td>Haul<br><span style="font-size:10px;color:#999;font-weight:400;">after broker</span></td>
        <td>${haulOn?fmt(haulNetCost):dash}</td>
        <td>${haulOn?fmt(haulSell):dash}</td>
        <td class="${haulOn?neg(haulNetCost,haulSell):''}">${haulOn?fmt(mdol(haulNetCost,haulSell)):dash}</td>
        <td class="${haulOn?neg(haulNetCost,haulSell):''}">${haulOn?fp(mpct(haulNetCost,haulSell)):dash}</td>
      </tr>
      <tr>
        <td>Material${mat&&mat.taxOn?'<br><span style="font-size:10px;color:#999;font-weight:400;">+'+mat.effectiveTax.toFixed(1)+'% tax on sell</span>':''}</td>
        <td>${mat?fmt(matCostVal):dash}</td>
        <td>${mat?fmt(matSellVal):dash}</td>
        <td class="${mat?neg(matCostVal,matSellVal):''}">${mat?fmt(mdol(matCostVal,matSellVal)):dash}</td>
        <td class="${mat?neg(matCostVal,matSellVal):''}">${mat?fp(mpct(matCostVal,matSellVal)):dash}</td>
      </tr>
      <tr class="combined-row${overTarget?' over-target':''}">
        <td>Combined${mat&&mat.taxOn?'<br><span style="font-size:10px;color:#999;font-weight:400;">incl. tax on mat sell</span>':''}</td>
        <td>${fmt(combinedCost)}</td>
        <td class="${overTarget?'neg':''}">${fmt(combinedSell)}</td>
        <td class="${mdol(combinedCost,combinedSell)<0||overTarget?'neg':''}">${fmt(mdol(combinedCost,combinedSell))}</td>
        <td class="${mpct(combinedCost,combinedSell)<0||overTarget?'neg':''}">${fp(mpct(combinedCost,combinedSell))}</td>
      </tr>
    </tbody>`;
  bk.appendChild(tbl);

  // all-in label row
  const dl=roundDir==='up'?'rounded up':'rounded down';
  const aiDiv=document.createElement('div');
  const aiClass=mode==='margin'?(roundDir==='up'?'up':'down'):'neutral';
  aiDiv.className='allin-row '+aiClass;
  aiDiv.innerHTML=`<span>${mode==='margin'?'All-in ('+dl+')':'Target price'}</span><span>${fmtR(allIn)}</span>`;
  bk.appendChild(aiDiv);

  // warning
  $('warning-banner').style.display=overTarget?'block':'none';

  lastCalc={uom,mat,haulOn,haulCost,haulSell,brokerKeep,netPayout,haulSlider,haulTotalMarginPct,mode,targetPrice,allIn};
  updateScript();
}

function buildInternal(){
  const v=lastCalc;if(!v.uom)return'';
  const d=new Date(),ds=(d.getMonth()+1)+'/'+d.getDate()+'/'+d.getFullYear();
  const cust=$('customer-name').value.trim();
  const dl=roundDir==='up'?'rounded up':'rounded down';
  let L=['--- INTERNAL QUOTE ---','Date: '+ds];
  if(cust)L.push('Customer: '+cust);
  L.push('Unit: per '+uomLabel[v.uom],'');
  if(v.haulOn)L.push('HAULING','  Cost:   '+fmt(v.haulCost),'  Sell:   '+fmt(v.haulSell),'');
  if(v.mat){
    const tl=v.mat.taxOn?v.mat.effectiveTax.toFixed(1)+'% tax':'no tax';
    L.push((v.mat.type||'MATERIAL').toUpperCase()+' ('+tl+')','  Cost:   '+fmt(v.mat.cost),'  Sell:   '+fmt(v.mat.sell),'');
  }
  if(v.mode==='margin')L.push('All-in: '+fmtR(v.allIn)+' / '+uomLabel[v.uom]+' ('+dl+')');
  else L.push('Target: '+fmt(v.allIn)+' / '+uomLabel[v.uom]);
  L.push('','--- Allied Trucking of Palm Beach ---');
  return L.join('\n');
}

function buildExternal(){
  const v=lastCalc;if(!v.uom)return'';
  const cust=$('customer-name').value.trim();
  const uom=uomLabel[v.uom];
  let msg=(cust?'Hi '+cust+',':'Hi,')+'\n\n';
  msg+='We are pleased to offer you the below rate';
  if(v.mat&&v.mat.type)msg+=' for '+v.mat.type;
  msg+=':\n\n';
  msg+='  '+fmtR(v.allIn)+' / '+uom+'\n\n';
  msg+='This rate is all-inclusive — material'+(v.haulOn?', hauling':'')+(v.mat&&v.mat.taxOn?' & tax':'')+'.\n';
  msg+='\nPlease don\'t hesitate to reach out with any questions. We appreciate your business!\n\n— Allied Trucking of Palm Beach';
  return msg;
}

function updateScript(){
  $('script-box').textContent=scriptTab==='internal'?buildInternal():buildExternal();
  const btn=$('copy-btn'),lbl=$('copy-label');
  btn.className='copy-btn '+(scriptTab==='internal'?'int':'ext');
  lbl.textContent=scriptTab==='internal'?'Copy internal script':'Copy customer script';
}

$('haul-margin').addEventListener('input',function(){$('haul-margin-disp').textContent=this.value+'%';calc();});
document.querySelectorAll('.nudge-btn[data-target]').forEach(btn=>{
  btn.addEventListener('click',function(){
    const sl=$(this.dataset.target),dp=$(this.dataset.disp);
    const min=parseInt(this.dataset.min||0),max=parseInt(this.dataset.max||50);
    let v=Math.min(max,Math.max(min,(parseInt(sl.value)||0)+(this.classList.contains('plus')?1:-1)));
    sl.value=v;dp.textContent=v+'%';calc();
  });
});
['haul-cost','uom','target-price'].forEach(id=>{$(id).addEventListener('input',calc);});
document.querySelectorAll('.rnd-btn').forEach(btn=>{btn.addEventListener('click',function(){setActiveRnd(this);calc();});});
document.querySelectorAll('.tab').forEach(t=>{
  t.addEventListener('click',function(){
    document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
    this.classList.add('active');mode=this.dataset.mode;
    $('mode-margin').style.display=mode==='margin'?'block':'none';
    $('mode-target').style.display=mode==='target'?'block':'none';
    calc();
  });
});
document.querySelectorAll('.stab').forEach(btn=>{
  btn.addEventListener('click',function(){
    document.querySelectorAll('.stab').forEach(b=>b.classList.remove('active'));
    this.classList.add('active');scriptTab=this.dataset.stab;updateScript();
  });
});
$('copy-btn').addEventListener('click',function(){
  navigator.clipboard.writeText($('script-box').textContent).then(()=>{
    this.classList.add('copied');$('copy-label').textContent='Copied!';
    setTimeout(()=>{this.classList.remove('copied');$('copy-label').textContent=scriptTab==='internal'?'Copy internal script':'Copy customer script';},2000);
  });
});
$('customer-name').addEventListener('input',updateScript);

if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{});}

materials.push(createMat());
renderMats();
const def=document.querySelector('.rnd-btn[data-val="1"][data-dir="up"]');
if(def)setActiveRnd(def);
</script>
</body>
</html>
